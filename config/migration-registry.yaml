# SweetClaude Migration Registry
# Pre-declared migration paths for all versioned state files.
# Read by `scripts/migrations/runner.py` to plan and execute migrations.
# Format: one entry per state file. Each migration lists from/to version,
# a handler module name (resolved under scripts/migrations/<handler>.py),
# an optional validation check, and whether a backup is required before running.
schema_version: 1

state_files:
  phase.yaml:
    description: "Active phase, work item, version stage, deference level"
    current_version: 2
    backup_required: true
    migrations:
      - from: 1
        to: 2
        description: "Separated version_stage from active_work_item; added work type + workflow template"
        handler: phase_yaml_v1_to_v2
        implemented_in: "scripts/migrations/phase_yaml_v1_to_v2.py"
        validation:
          required_fields: [schema_version, version_stage, deference_level]
          required_version: 2

  skills.yaml:
    description: "Onboarding state for the six data-owning skills"
    current_version: 2
    backup_required: false
    migrations:
      - from: 1
        to: 2
        description: "Replaced enabled boolean with three-state status (active/paused/uninitialized); added last_changed_at and last_changed_by"
        handler: skills_yaml_v1_to_v2
        implemented_in: "scripts/migrations/skills_yaml_v1_to_v2.py"
        validation:
          # skills.yaml has skill names at the top level (not nested under a 'skills' key),
          # so post-validation only checks for schema_version + required_version.
          required_fields: [schema_version]
          required_version: 2

  sweetclaude.yaml:
    description: "Unified project state — framework metadata, project metadata, work state, features, drift findings"
    current_version: 2
    backup_required: true
    migrations:
      - from: 1
        to: 2
        description: "Decline-state amnesty + stale discovery cleanup. Clears legacy boolean declined to null, clears stale update.available if older than installed_version, clears stale update.check_error."
        handler: sweetclaude_yaml_v1_to_v2
        implemented_in: "scripts/migrations/sweetclaude_yaml_v1_to_v2.py"
        validation:
          required_fields: [schema_version]
          required_version: 2

  project.yaml:
    description: "Language, framework, test runner, build commands"
    current_version: 1
    backup_required: false
    migrations: []

  john-wick.yaml:
    description: "John Wick autonomous pipeline state"
    current_version: 1
    backup_required: true
    migrations: []

  corpus-pipeline.yaml:
    description: "Document corpus pipeline state"
    current_version: 1
    backup_required: false
    migrations: []

# Backup behavior
# When backup_required: true, the update skill creates a tarball of the full
# .sweetclaude/state/ directory before running that file's migration.
# Backup path: .sweetclaude/state/backups/pre-migration-{date}-{sha7}.tar.gz
# Rollback: extract the tarball to restore the pre-migration state.
backup_policy:
  path_template: ".sweetclaude/state/backups/pre-migration-{date}-{sha7}.tar.gz"
  retain_last_n: 5
