# SweetClaude Phase-Skill Mapping
# Defines which skills, agents, and hooks are available per phase.
# Two tracks: code (technical development) and strategy (strategic product development).
# The work router classifies work type and surfaces skills from the appropriate track.

always_loaded:
  skills:
    - sweetclaude
    - sweetclaude:new-task
    - sweetclaude:hibernate
    - hibernate-project
  rules:
    - sweetclaude/interaction-model.md
    - sweetclaude/phase-gates.md
    - sweetclaude/tdd-levels.md

