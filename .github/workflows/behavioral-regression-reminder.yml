name: Behavioral Regression Reminder

on:
  schedule:
    # Runs on the 1st of every month at 09:00 UTC
    - cron: '0 9 1 * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you triggering this manually?'
        required: false
        default: 'Manual trigger'

jobs:
  check-regression-staleness:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check last regression test date
        id: check_date
        run: |
          # Extract the most recent test date from behavioral-contracts.md
          # Looks for lines matching "**Tested:** YYYY-MM-DD"
          LAST_TESTED=$(grep -o '**Tested:** [0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}' \
            docs/user-guide/behavioral-contracts.md \
            | sort -r | head -1 | grep -o '[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}' || echo "")

          if [ -z "$LAST_TESTED" ]; then
            echo "stale=true" >> "$GITHUB_OUTPUT"
            echo "last_tested=unknown" >> "$GITHUB_OUTPUT"
            echo "days_since=unknown" >> "$GITHUB_OUTPUT"
          else
            TODAY=$(date +%Y-%m-%d)
            DAYS_SINCE=$(( ( $(date -d "$TODAY" +%s) - $(date -d "$LAST_TESTED" +%s) ) / 86400 ))
            echo "last_tested=$LAST_TESTED" >> "$GITHUB_OUTPUT"
            echo "days_since=$DAYS_SINCE" >> "$GITHUB_OUTPUT"

            if [ "$DAYS_SINCE" -gt 60 ]; then
              echo "stale=true" >> "$GITHUB_OUTPUT"
            else
              echo "stale=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Check for open reminder issue
        id: check_issue
        if: steps.check_date.outputs.stale == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OPEN=$(gh issue list \
            --label "behavioral-regression" \
            --state open \
            --json number \
            --jq 'length')
          echo "open_count=$OPEN" >> "$GITHUB_OUTPUT"

      - name: Open reminder issue
        if: >
          steps.check_date.outputs.stale == 'true' &&
          steps.check_issue.outputs.open_count == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LAST_TESTED="${{ steps.check_date.outputs.last_tested }}"
          DAYS_SINCE="${{ steps.check_date.outputs.days_since }}"

          gh issue create \
            --title "Run behavioral regression suite — last tested $LAST_TESTED ($DAYS_SINCE days ago)" \
            --label "behavioral-regression" \
            --body "$(cat <<'BODY'
## Behavioral regression run needed

The behavioral contract status in \`docs/user-guide/behavioral-contracts.md\` has not been updated in **$DAYS_SINCE days** (last tested: $LAST_TESTED).

SweetClaude's instruction-guided behavioral properties can drift silently when the underlying Claude model changes. The 15-contract test suite exists to detect this before users notice it.

## How to run

In a Claude Code session:

\`\`\`
/sweetclaude:behavioral-regression
\`\`\`

This runs all 15 contracts and produces a scored report.

## After running

Update \`docs/user-guide/behavioral-contracts.md\` with the results and close this issue.

If any load-bearing contracts fail (CONTRACT-01, CONTRACT-02, CONTRACT-04, CONTRACT-05, CONTRACT-11), open a separate issue with the observed behavior.

---
*Opened automatically by the behavioral-regression-reminder workflow.*
BODY
)"
